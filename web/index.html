<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋 - Web UI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="title">中国象棋</h1>
            <p class="subtitle">Chinese Chess · Xiangqi</p>
        </header>

        <div class="main-content">
            <aside class="sidebar left-sidebar">
                <div class="panel game-info">
                    <h3>对局信息</h3>
                    <div class="info-item">
                        <span class="label">当前回合</span>
                        <span class="value" id="current-player">红方</span>
                    </div>
                    <div class="info-item">
                        <span class="label">走子步数</span>
                        <span class="value" id="move-count">0</span>
                    </div>
                    <div class="info-item">
                        <span class="label">局面评估</span>
                        <span class="value" id="evaluation">0</span>
                    </div>
                    <div class="check-status" id="check-status"></div>
                </div>

                <div class="panel game-controls">
                    <h3>游戏控制</h3>
                    <button class="btn btn-primary" id="btn-pvp">人机对战</button>
                    <button class="btn btn-secondary" id="btn-predict">预测未来五步</button>
                    <button class="btn btn-secondary" id="btn-analyze">分析当前局面</button>
                    <button class="btn btn-warning" id="btn-undo">悔棋</button>
                    <button class="btn btn-success" id="btn-restart">重新开始</button>
                    <button class="btn btn-info" id="btn-rules">规则展示</button>
                    <button class="btn btn-danger" id="btn-exit">退出</button>
                </div>

                <div class="panel move-input">
                    <h3>输入走法</h3>
                    <div class="input-group">
                        <input type="number" id="input-from-row" placeholder="起行" min="0" max="9">
                        <input type="number" id="input-from-col" placeholder="起列" min="0" max="8">
                    </div>
                    <div class="input-group">
                        <input type="number" id="input-to-row" placeholder="目标行" min="0" max="9">
                        <input type="number" id="input-to-col" placeholder="目标列" min="0" max="8">
                    </div>
                    <button class="btn btn-primary" id="btn-move">执行走法</button>
                </div>
            </aside>

            <main class="board-container">
                <div class="board-wrapper">
                    <div class="board" id="board">
                        <div class="board-lines">
                            <svg class="lines-svg" viewBox="0 0 540 600" preserveAspectRatio="none">
                                <defs>
                                    <pattern id="woodPattern" patternUnits="userSpaceOnUse" width="540" height="600">
                                        <rect width="540" height="600" fill="#e8c882"/>
                                    </pattern>
                                </defs>
                                <g stroke="#5c3d2e" stroke-width="1.5">
                                    <line x1="30" y1="30" x2="510" y2="30"/>
                                    <line x1="30" y1="90" x2="510" y2="90"/>
                                    <line x1="30" y1="150" x2="510" y2="150"/>
                                    <line x1="30" y1="210" x2="510" y2="210"/>
                                    <line x1="30" y1="270" x2="510" y2="270"/>
                                    <line x1="30" y1="330" x2="510" y2="330"/>
                                    <line x1="30" y1="390" x2="510" y2="390"/>
                                    <line x1="30" y1="450" x2="510" y2="450"/>
                                    <line x1="30" y1="510" x2="510" y2="510"/>
                                    <line x1="30" y1="570" x2="510" y2="570"/>

                                    <line x1="30" y1="30" x2="30" y2="570"/>
                                    <line x1="90" y1="30" x2="90" y2="270"/>
                                    <line x1="90" y1="330" x2="90" y2="570"/>
                                    <line x1="150" y1="30" x2="150" y2="570"/>
                                    <line x1="210" y1="30" x2="210" y2="570"/>
                                    <line x1="270" y1="30" x2="270" y2="570"/>
                                    <line x1="330" y1="30" x2="330" y2="570"/>
                                    <line x1="390" y1="30" x2="390" y2="570"/>
                                    <line x1="450" y1="30" x2="450" y2="570"/>
                                    <line x1="510" y1="30" x2="510" y2="570"/>

                                    <line x1="210" y1="30" x2="330" y2="150"/>
                                    <line x1="330" y1="30" x2="210" y2="150"/>
                                    <line x1="210" y1="450" x2="330" y2="570"/>
                                    <line x1="330" y1="450" x2="210" y2="570"/>
                                </g>
                            </svg>
                        </div>
                        <div class="river">
                            <span class="river-text">楚 河</span>
                            <span class="river-text">漢 界</span>
                        </div>
                        <div class="pieces-container" id="pieces-container"></div>
                        <div class="valid-moves-container" id="valid-moves-container"></div>
                        <div class="last-move-indicator" id="last-move-indicator"></div>
                    </div>
                </div>

                <div class="board-coordinates">
                    <div class="coord-row top-coords">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
                    </div>
                    <div class="coord-col left-coords">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                    <div class="coord-col right-coords">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                    <div class="coord-row bottom-coords">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
                    </div>
                </div>
            </main>

            <aside class="sidebar right-sidebar">
                <div class="panel message-panel">
                    <h3>消息提示</h3>
                    <div class="messages" id="messages"></div>
                </div>

                <div class="panel captured-pieces">
                    <h3>已吃棋子</h3>
                    <div class="captured-group">
                        <span class="captured-label">红方吃到:</span>
                        <div class="captured-list" id="red-captured"></div>
                    </div>
                    <div class="captured-group">
                        <span class="captured-label">黑方吃到:</span>
                        <div class="captured-list" id="black-captured"></div>
                    </div>
                </div>
            </aside>
        </div>

        <div class="modal-overlay" id="modal-overlay" style="display: none;">
            <div class="modal" id="modal">
                <div class="modal-header">
                    <h3 id="modal-title">标题</h3>
                    <button class="modal-close" id="modal-close">&times;</button>
                </div>
                <div class="modal-body" id="modal-body"></div>
                <div class="modal-footer" id="modal-footer"></div>
            </div>
        </div>

        <div class="loading-overlay" id="loading-overlay" style="display: none;">
            <div class="loading-spinner"></div>
            <p id="loading-text">AI思考中...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
